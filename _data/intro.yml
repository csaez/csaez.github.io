content: |
  Engineering manager with a strong technical background, spanning ML research,
  real-time graphics, and large-scale production platforms. I have been writing
  code and building tools for 20 years, from C++ and Python in visual effects
  through to leading engineering teams today.

  I took an AI research team and scaled it into a two-team organization, shipping
  machine-learning features into tools used on virtually every major film
  production. I develop engineers into leaders - two of my reports are now
  engineering managers running their own teams - and I stay hands-on enough to
  fill technical gaps when a team needs it.

  Leading a team of PhD researchers in a domain I initially knew little about
  taught me the most important lesson of my career: to stop being the smartest
  person in the room, delegate real ownership, and measure my success by the
  team's rather than by the code I write. Since then I have led teams in two very
  different domains - ML research and core product engineering - and put that
  thinking into practice, creating opportunities like a rotating tech-lead role
  that lets engineers test-drive leadership with full support.
