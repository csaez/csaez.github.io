content: |
  Engineering leader with 20 years of experience spanning AI research,
  commercial software, and large-scale content creation platforms.

  Built Foundry's AI Research function from inception to a multi-team
  organization, developed engineering leaders who progressed into management
  roles, and currently drive portfolio-level engineering strategy and
  execution across Katana.

  Combines deep technical credibility with a proven ability to scale teams,
  shape organizational direction, and consistently operate at the intersection
  of technical leadership, org design, and cross-portfolio strategy.
