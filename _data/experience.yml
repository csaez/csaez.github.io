# Jobs
- company: Foundry, London
  position: Engineering Manager, Katana
  duration: Jul 2025 - Present
  summary: |
    - **Manage two engineering teams (~13 people across engineering, QA, and
      product) delivering the core of the next major product release** - one team
      on the underlying data and rendering infrastructure, the other on the
      user-facing features built on top. Took on the larger area when a peer
      manager departed, consolidating a domain that had struggled to deliver.
    - **Kept a team delivering ahead of schedule after it lost its lead architect
      mid-project.** Stepped in to fill the technical gap myself while shifting the
      team from dependence on one expert to broad autonomy. It went on to
      outperform its peers sprint after sprint, routinely finishing early and
      picking up work from other teams.
    - **Designed a delivery process now used across the entire product line.**
      Created a role and rotation that puts an engineer ahead of each feature to do
      the upfront analysis, turning planning from open-ended discovery into fast,
      well-informed estimation. Adopted by all three teams.
    - **Shipped a customer-facing feature that would otherwise have slipped a full
      release cycle.** With the roadmap done early, I secured product sign-off and
      delivered it in one sprint - sequencing the breaking changes into the major
      release so the finished feature could land in the next maintenance update
      rather than a year later.
    - **Removed a long-standing productivity blocker for the whole engineering
      group.** Built a tooling fix that made IDE and debugger workflows work on our
      codebase for the first time, and drove team-wide adoption of build caching -
      turning slow rebuilds into a non-event.
    - **Mentor leaders beyond my own teams:** two peer engineering managers, and -
      at the CTO's recommendation - a senior engineer in another department
      preparing for a management role.

- company: Foundry, London
  position: Engineering Manager, AI Research
  duration: Jul 2022 - Jul 2025
  summary: |
    - **Took over a single research team and grew it into a two-team organization
      I managed directly (up to ~9 people), setting the operating model the wider
      group scaled on.** As demand rose I hired, split the work into two focused
      teams, and established the structure and ways of working that later teams
      adopted as the org expanded to four.
    - **Developed two senior engineers into engineering managers who now lead
      teams.** For one, that meant a year of deliberate coaching - closing skill
      gaps and helping her choose between an IC and a management path. Building the
      next layer of leadership was a core part of the job, not a byproduct.
    - **Filled a product and delivery vacuum a normally-supported org would never
      have to.** With no product or delivery manager early on, I owned roadmapping
      with product stakeholders, ran the team's planning and tracking, and
      regularly presented the org's work to the executive team at quarterly
      reviews.
    - **Led a team of researchers doing novel ML research - building and training
      models - and shipped three flagship features into Nuke** (CopyCat, Inference,
      Cattery), Foundry's industry-standard compositing tool used on virtually
      every major film production for over a decade. I also personally bridged the
      smaller integration gap into product until that work grew into its own team.
    - **Built and ran the technical hiring framework for research engineering.**
      Designed a metrics-based scoring system for the technical evaluation and ran
      a consistent interview panel against it to compare candidates objectively -
      later adapted and shared with other groups to make hiring more consistent and
      less biased.

- company: Foundry, London
  position: Senior Software Engineer, Real-Time Research
  duration: Sep 2020 - Jul 2022
  summary: |
    - **Drove early prototyping of what became Nuke Stage, Foundry's real-time
      virtual production product** (now used on live film productions). As the most
      senior engineer in the early team, I built prototypes across the stack while
      the product direction was still being found - GPU compute kernels for 2.5D
      virtual-production scenarios (on-set color grading, spherical mapping), the
      application and plugin architecture, camera-tracking integration, and
      networking. This exploratory work helped shape the direction the shipping
      product was later built on.
    - **Joined as the team's USD expert and contributed to the early prototype of
      Nuke's USD-based 3D system.** Collaborated with the project's lead architect
      during the prototyping phase, building out core nodes for a plugin that could
      coexist with Nuke's native 3D system. The prototype was greenlit and matured
      by the team over several years into what ships today.

- company: DNEG, London
  position: Software Engineer, R&D
  duration: Aug 2019 - Sep 2020
  summary: |
    - **Designed and built the asset resolution system for the studio's Scene
      Description platform** (built on USD) - the layer that determines how assets
      are located and loaded across productions. Also fixed and improved core
      systems across the platform as part of the production technology team.
    - **Built foundational tools used across major feature-film productions,**
      including *Tenet*, *No Time to Die*, and *Fast & Furious 9* - the kind of
      core pipeline systems that outlast any single project.

- company: Animal Logic, Sydney
