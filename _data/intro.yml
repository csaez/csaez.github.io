content: |
  Engineering leader with deep technical roots spanning ML research, real-time
  graphics, and large-scale production platforms. Over 20 years I have grown from
  writing C++ and Python for visual effects into leading engineering teams,
  scaling them, and shaping how they work - often through influence rather than
  authority.

  Leading a team of PhD researchers in a domain I initially knew little about
  taught me the most important lesson of my career: to stop being the smartest
  person in the room, delegate real ownership, and measure my success by the
  team's rather than by the code I write. I retain enough technical depth to
  unblock teams, challenge architectural decisions, and step into critical work
  when delivery is at risk, but my focus is developing engineers into leaders -
  for example through a rotating tech-lead role that lets them test-drive
  leadership with support.
